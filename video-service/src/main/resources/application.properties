spring.application.name=video-service

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Multipart file upload
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# Server
server.port=8082

# AWS Config
aws.access-key=${AWS_ACCESS_KEY:your-access-key}
aws.secret-key=${AWS_SECRET_KEY:your-secret-key}
aws.region=${AWS_REGION:ap-south-1}
aws.s3.bucket-name=${AWS_BUCKET_NAME}

# Actuator
management.endpoints.web.exposure.include=health,info